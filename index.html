<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mechanik System</title>

<style>
body { font-family: Arial; background:#111; color:white; padding:20px; }
input, select, button { padding:10px; margin:5px; }
.card { background:#222; padding:15px; margin-bottom:10px; border-radius:10px; }
h2 { margin-top:0; }
.big { font-size:22px; font-weight:bold; color:#00ff88; }
</style>

</head>

<body>

<h1>🔧 Mechanik System</h1>

<div class="card">
<h2>👤 Mechanik</h2>
<input id="mechanik" placeholder="Jméno mechanika">
</div>

<div class="card">
<h2>⏱ Směna</h2>
<button onclick="startShift()">🟢 Start směny</button>
<button onclick="endShift()">🔴 Konec směny</button>
<p id="shiftStatus">Směna: ❌ neaktivní</p>
</div>

<div class="card">
<h2>🔧 Zakázka</h2>

<select id="frakce">
<option>LSPD</option>
<option>EMS</option>
<option>LSSD</option>
<option>OBČAN</option>
</select>

<select id="typ">
<option>Tuning</option>
<option>Oprava</option>
</select>

<br>

<input id="components" type="number" placeholder="Počet komponent">

<br>

<button onclick="sendLog()">📩 Odeslat</button>
</div>

<div class="card">
<h2>💰 Výplata za směnu</h2>

<p class="big" id="salary">0 $</p>
<p>🔧 Zakázky: <span id="jobs">0</span></p>
<p>💵 Celkový obrat: <span id="total">0</span> $</p>
</div>

<script>

const { ipcRenderer } = require("electron");

/* =======================
   WEBHOOKY
======================= */
const WEBHOOKS = {
  LSPD: "https://discord.com/api/webhooks/1498994945720193116/7JLdS9rlFYdtMWPphDi7uKd1rzkKNhq3XJxL_Os_6JfeQz79n_dqwjv2o5fsor7QUHTh",
  EMS: "https://discord.com/api/webhooks/1498994888187052194/DJs65eZs6H4xOUT7gQN_Y92-FfxSuC5D4oehiAwQzrJHgbdTWzYwbqFHeN1aqP3iX5y6",
  LSSD: "https://discord.com/api/webhooks/1498995030348660816/6Hoon1Zm6nRI-IOeB6G83n6ucJ8kD-3Ip9KCuYw0dCMGuFnX0XpMURIZ5RgLKGHoCCgA",
  OBČAN: "https://discord.com/api/webhooks/1499001119664377977/Ov2HGZ_ZDlkocu6zDXRvliDQA7t2gQkFqhsCDXwjopFYmb09fBnBMA5LuikAaOcov4OC",
  SHIFTS: "https://discord.com/api/webhooks/1498999184727212143/Dzb4AiJblx51X8CLK6dtMjv54TyXIBx8NBlqB2KTFg33N-TaROz5Jm8UKGK-1gg3f17t"
};

/* =======================
   STAV
======================= */
let shiftActive = false;
let jobs = 0;
let total = 0;

/* LOAD */
if (localStorage.getItem("jobs")) {
  jobs = Number(localStorage.getItem("jobs"));
  total = Number(localStorage.getItem("total"));
  shiftActive = localStorage.getItem("shift") === "true";
  updateUI();
}

function save() {
  localStorage.setItem("jobs", jobs);
  localStorage.setItem("total", total);
  localStorage.setItem("shift", shiftActive);
}

/* =======================
   DISCORD
======================= */
function sendWebhook(url, content) {
  fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ content })
  });
}

/* =======================
   SYNC DO MAIN.JS
======================= */
function syncShift() {
  ipcRenderer.send("shift-state", {
    active: shiftActive,
    jobs,
    total
  });
}

/* =======================
   SMĚNA
======================= */
function startShift() {
  shiftActive = true;
  syncShift();

  const name = document.getElementById("mechanik").value;

  sendWebhook(WEBHOOKS.SHIFTS,
    `🟢 START SMĚNY\nMechanik: ${name}\nČas: ${new Date().toLocaleString()}`
  );

  updateUI();
  save();
}

function endShift() {
  shiftActive = false;
  syncShift();

  const name = document.getElementById("mechanik").value;

  sendWebhook(WEBHOOKS.SHIFTS,
    `🔴 KONEC SMĚNY\nMechanik: ${name}\nVýplata: ${getSalary()}$\nČas: ${new Date().toLocaleString()}`
  );

  jobs = 0;
  total = 0;

  updateUI();
  save();
}

/* =======================
   ZAKÁZKA
======================= */
function sendLog() {
  if (!shiftActive) return alert("Nejdřív začni směnu!");

  const name = document.getElementById("mechanik").value;
  const frakce = document.getElementById("frakce").value;
  const typ = document.getElementById("typ").value;
  const components = Number(document.getElementById("components").value);

  const price = components * 150;

  jobs++;
  total += price;

  const msg =
`🔧 ${typ.toUpperCase()} ZAKÁZKA
Mechanik: ${name}
Komponenty: ${components}
Cena: ${price}$`;

/* ✔ FIX OBČAN */
const hookMap = {
  "LSPD": WEBHOOKS.LSPD,
  "EMS": WEBHOOKS.EMS,
  "LSSD": WEBHOOKS.LSSD,
  "OBČAN": WEBHOOKS.OBČAN
};

sendWebhook(hookMap[frakce], msg);

  updateUI();
  save();
}

/* =======================
   VÝPOČET
======================= */
function getSalary() {
  return Math.floor(total * 0.2);
}

/* =======================
   UI
======================= */
function updateUI() {
  document.getElementById("jobs").innerText = jobs;
  document.getElementById("total").innerText = total;
  document.getElementById("salary").innerText = getSalary() + " $";

  document.getElementById("shiftStatus").innerText =
    "Směna: " + (shiftActive ? "✔ aktivní" : "❌ neaktivní");
}

/* =======================
   ✔ FORCE CLOSE Z MAIN.JS
======================= */
ipcRenderer.on("force-end-shift", () => {

  const name = document.getElementById("mechanik").value;

  sendWebhook(WEBHOOKS.SHIFTS,
    `🔴 AUTO KONEC SMĚNY (force close)\nMechanik: ${name}\nVýplata: ${getSalary()}$`
  );

  shiftActive = false;
  jobs = 0;
  total = 0;

  save();
  updateUI();
});

/* =======================
   ✔ Update checker z main.js
======================= */
const { ipcRenderer } = require("electron");

// 🔄 update dostupný
ipcRenderer.on("update_available", () => {
  alert("🔄 Je dostupná nová verze aplikace!");
});

// 📥 update stažen
ipcRenderer.on("update_ready", () => {
  const ok = confirm("✔ Update stažen. Chceš restartovat aplikaci?");
  
  if (ok) {
    ipcRenderer.send("restart_app");
  }
});

</script>

</body>
</html>
